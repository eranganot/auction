<!doctype html>
<html dir="rtl" lang="he">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="מכרזי רכב" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <title>מכרזי רכב — Bidspirit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body { font-family: 'Segoe UI', Arial, sans-serif; }
      th[data-sort] { cursor: pointer; user-select: none; }
      th[data-sort]:hover { background-color: rgb(241 245 249); }
    </style>
  </head>
  <body class="bg-slate-100 text-slate-800">
    <div class="mx-auto max-w-7xl p-4">
      <header class="mb-4 flex flex-wrap items-center justify-between gap-3">
        <h1 class="text-2xl font-bold text-slate-900">מכרזי רכב תואמים</h1>
        <div class="flex items-center gap-3">
          <div id="status-strip" class="text-sm text-slate-600">טוען נתונים…</div>
          <button id="install-app" type="button" title="התקן את האפליקציה במסך הבית"
            class="hidden rounded bg-blue-600 px-3 py-1.5 text-sm font-semibold text-white hover:bg-blue-700">
            📲 התקן אפליקציה
          </button>
          <button id="enable-push" type="button" title="קבלת התראות דפדפן על שינויים יומיים"
            class="hidden rounded bg-amber-500 px-3 py-1.5 text-sm font-semibold text-white hover:bg-amber-600">
            🔔 הפעל התראות דפדפן
          </button>
          <button id="test-push" type="button" title="שלח התראת בדיקה למכשיר זה"
            class="hidden rounded bg-slate-200 px-3 py-1.5 text-sm font-semibold text-slate-700 hover:bg-slate-300">
            שלח התראת בדיקה
          </button>
        </div>
      </header>

      <nav class="mb-4 flex gap-1 border-b border-slate-200">
        <button data-tab="cars"
          class="tab-btn -mb-px border-b-2 border-blue-600 px-4 py-2 text-sm font-semibold text-blue-600">
          רכבים
        </button>
        <button data-tab="changes"
          class="tab-btn -mb-px border-b-2 border-transparent px-4 py-2 text-sm font-semibold text-slate-500 hover:text-slate-700">
          שינויים יומיים
        </button>
      </nav>

      <div id="tab-cars" class="grid grid-cols-1 gap-4 lg:grid-cols-4">
        <!-- Sidebar: filter settings -->
        <aside class="lg:col-span-1">
          <form id="filter-form" class="rounded-xl bg-white p-4 shadow">
            <h2 class="mb-3 text-lg font-semibold">הגדרות סינון</h2>

            <label class="mb-2 block text-sm">
              שנת מודל מינימלית
              <input type="number" name="minModelYear" min="1900" max="2100"
                class="mt-1 w-full rounded border border-slate-300 p-2" />
            </label>

            <label class="mb-2 block text-sm">
              קילומטראז' מקסימלי
              <input type="number" name="maxMileage" min="0"
                class="mt-1 w-full rounded border border-slate-300 p-2" />
            </label>

            <label class="mb-2 block text-sm">
              יד מקסימלית
              <input type="number" name="maxHand" min="1" max="20"
                class="mt-1 w-full rounded border border-slate-300 p-2" />
            </label>

            <label class="mb-2 block text-sm">
              מחיר פתיחה מקסימלי (₪)
              <input type="number" name="maxPrice" min="0"
                class="mt-1 w-full rounded border border-slate-300 p-2" />
            </label>

            <fieldset class="mb-2">
              <legend class="text-sm">תיבת הילוכים</legend>
              <div id="transmission-options" class="mt-1 space-y-1 text-sm"></div>
            </fieldset>

            <fieldset class="mb-3">
              <legend class="text-sm">בעלות</legend>
              <div id="ownership-options" class="mt-1 space-y-1 text-sm"></div>
            </fieldset>

            <button type="submit"
              class="w-full rounded bg-blue-600 px-4 py-2 font-semibold text-white hover:bg-blue-700">
              שמור והחל
            </button>
            <p id="filter-msg" class="mt-2 text-center text-sm"></p>
          </form>
        </aside>

        <!-- Main: results table -->
        <main class="lg:col-span-3">
          <div class="mb-2 flex flex-wrap items-center justify-end gap-4">
            <label class="flex items-center gap-2 text-sm text-slate-600">
              טווח מכירות:
              <select id="within-days" class="rounded border border-slate-300 p-1 text-sm">
                <option value="7" selected>7 הימים הקרובים</option>
                <option value="14">14 הימים הקרובים</option>
                <option value="30">30 הימים הקרובים</option>
                <option value="all">הכל</option>
              </select>
            </label>
            <label class="flex items-center gap-2 text-sm text-slate-600">
              <input type="checkbox" id="show-inactive" />
              הצג גם מכירות שהסתיימו
            </label>
          </div>
          <div class="overflow-x-auto rounded-xl bg-white shadow">
            <table class="min-w-full text-right text-sm">
              <thead class="bg-slate-50 text-slate-700">
                <tr>
                  <th class="p-2" data-sort="makeModel">יצרן ודגם</th>
                  <th class="p-2" data-sort="modelYear">שנת מודל</th>
                  <th class="p-2" data-sort="dateOnRoad">עליה לכביש</th>
                  <th class="p-2" data-sort="mileage">קילומטראז'</th>
                  <th class="p-2">תיבת הילוכים</th>
                  <th class="p-2" data-sort="hand">יד</th>
                  <th class="p-2">בעלות</th>
                  <th class="p-2" data-sort="openingPrice">מחיר פתיחה</th>
                  <th class="p-2" data-sort="tariffPrice">מחיר מחירון</th>
                  <th class="p-2" data-sort="auctionStartsAt">תאריך מכירה</th>
                  <th class="p-2" data-sort="lastSeenAt">עודכן</th>
                  <th class="p-2">קישור</th>
                </tr>
              </thead>
              <tbody id="cars-body">
                <tr><td colspan="12" class="p-6 text-center text-slate-400">טוען…</td></tr>
              </tbody>
            </table>
          </div>
          <p id="result-count" class="mt-2 text-sm text-slate-600"></p>
        </main>
      </div>

      <div id="tab-changes" class="hidden">
        <section class="mx-auto max-w-2xl rounded-xl bg-white p-4 shadow">
          <h2 class="mb-3 text-lg font-semibold">שינויים יומיים</h2>
          <div id="changes-list" class="space-y-2 text-sm text-slate-700">
            <p class="text-slate-400">טוען…</p>
          </div>
        </section>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
